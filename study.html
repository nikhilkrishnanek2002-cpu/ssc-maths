<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Exam Simulator - Study Master</title>
    <link rel="stylesheet" href="css/modern_theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-badge">SSC CGL Complete Preparation</div>
        <h1>Study Master Platform</h1>
        <p>61 comprehensive topics with 700+ worked examples, 180+ speed hacks & complete exam coverage</p>
        <div class="hero-stats">
            <div class="stat">
                <div class="stat-num">61</div>
                <div class="stat-label">Topics</div>
            </div>
            <div class="stat">
                <div class="stat-num">650+</div>
                <div class="stat-label">Examples</div>
            </div>
            <div class="stat">
                <div class="stat-num">165+</div>
                <div class="stat-label">Speed Hacks</div>
            </div>
            <div class="stat">
                <div class="stat-num">6</div>
                <div class="stat-label">Subjects</div>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-wrapper">
        <div class="nav">
            <button class="nav-btn active" onclick="filterBySubject('all')">All</button>
            <button class="nav-btn" onclick="filterBySubject('math')">📐 Math</button>
            <button class="nav-btn" onclick="filterBySubject('english')">📚 English</button>
            <button class="nav-btn" onclick="filterBySubject('reasoning')">🧠 Reasoning</button>
            <button class="nav-btn" onclick="filterBySubject('gk')">🌍 GK</button>
            <button class="nav-btn" onclick="filterBySubject('computer')">💻 Comp</button>
            <button class="nav-btn" onclick="filterBySubject('pyq')">📂 PYQ Vault</button>
            <button class="nav-btn" onclick="filterBySubject('tier2')" style="color: var(--accent4);">🏆 Tier-2 Focus</button>
            <button class="nav-btn" style="margin-left: auto;" onclick="goHome()"><i class="fas fa-home"></i> Home</button>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="container">
        <!-- Search & Filter Section -->
        <div style="margin-bottom: 32px;">
            <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;">
                <input type="text" id="search-bar" placeholder="Search topics (e.g., Quadratic Equations)..." 
                       style="flex: 1; min-width: 250px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;" 
                       onkeyup="searchTopics(this.value)">
                <button class="btn" onclick="startQuiz()">
                    <i class="fas fa-play"></i> Start Quiz
                </button>
            </div>
            <div id="content-status" style="margin-top: 12px; font-size: 14px; color: var(--text);">
                <!-- Updated by JS -->
            </div>
            <div id="active-filters" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
        </div>

        <!-- Topics Grid -->
        <div id="topics-grid" class="topics-grid">
            <!-- Topics loaded here by JavaScript -->
        </div>

        <style>
            .topics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-bottom: 40px;
            }

            @media (max-width: 1024px) {
                .topics-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 650px) {
                .topics-grid {
                    grid-template-columns: 1fr;
                    gap: 16px;
                }
            }

            .new-badge {
                position: absolute;
                top: -10px;
                right: 10px;
                background: linear-gradient(135deg, #ff416c, #ff4b2b);
                color: white;
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 10px;
                font-weight: bold;
                z-index: 2;
                box-shadow: 0 4px 10px rgba(255, 65, 108, 0.3);
                letter-spacing: 0.5px;
            }
        </style>

        <!-- Topic Detail View -->
        <div id="topic-detail" style="display: none;">
            <button class="btn btn-secondary" onclick="closeTopic()">← Back to Topics</button>
            <div id="topic-content" style="margin-top: 24px;">
                <!-- Topic details loaded here -->
            </div>
        </div>
    </div>

    <script src="js/data/math_theorems.js"></script>
    <script src="js/data/math_theorems_expanded.js"></script>
    <script src="js/data/english_rules.js"></script>
    <script src="js/data/english_vocabulary_comprehensive.js"></script>
    <script src="js/data/reasoning_tricks.js"></script>
    <script src="js/data/reasoning_tricks_expanded.js"></script>
    <script src="js/data/gk_bank.js"></script>
    <script src="js/data/gk_comprehensive_expanded.js"></script>
    <script src="js/data/pyq_bank.js"></script>
    <script src="js/data/computer_knowledge.js"></script>
    <script src="js/data/statistics_advanced.js"></script>
    
    <!-- GK Category Expansion -->
    <script src="js/data/gk_history_capsule.js"></script>
    <script src="js/data/gk_polity_capsule.js"></script>
    <script src="js/data/gk_science_capsule.js"></script>
    <script src="js/data/gk_economics_capsule.js"></script>
    <script src="js/data/gk_geography_capsule.js"></script>
    <script src="js/data/gk_superlatives_capsule.js"></script>
    <script src="js/data/gk_history_medieval_expanded.js"></script>
    <script src="js/data/gk_history_modern_expanded.js"></script>
    <script src="js/data/gk_science_tables.js"></script>
    <script src="js/data/gk_polity_expanded.js"></script>
    <script src="js/data/gk_geography_expanded.js"></script>
    <script src="js/data/gk_economics_expanded.js"></script>
    <script src="js/data/gk_capsule_supplement.js"></script>
    <script src="js/data/gk_capsule_final_tables.js"></script>
    
    <!-- New GA/GS Master Capsules -->
    <script src="js/data/ga_physics_capsule.js"></script>
    <script src="js/data/ga_chemistry_capsule.js"></script>
    <script src="js/data/ga_biology_capsule.js"></script>
    <script src="js/data/ga_history_capsule.js"></script>
    <script src="js/data/ga_geography_capsule.js"></script>
    <script src="js/data/ga_polity_capsule.js"></script>
    <script src="js/data/ga_economics_capsule.js"></script>

    <script>
        // Merged study data - Ensuring all sources are consolidated
        const allStudyData = {
            ...(typeof mathData !== 'undefined' ? mathData : {}),
            ...(typeof mathDataExpanded !== 'undefined' ? mathDataExpanded : {}),
            ...(typeof englishData !== 'undefined' ? englishData : {}),
            ...(typeof englishVocabularyData !== 'undefined' ? englishVocabularyData : {}),
            ...(typeof reasoningData !== 'undefined' ? reasoningData : {}),
            ...(typeof reasoningDataExpanded !== 'undefined' ? reasoningDataExpanded : {}),
            ...(typeof gkDataExpanded !== 'undefined' ? gkDataExpanded : {}),
            ...(typeof computerData !== 'undefined' ? computerData : {}),
            ...(typeof statisticsData !== 'undefined' ? statisticsData : {}),
            
            // GS Capsules
            ...(typeof gaPhysicsData !== 'undefined' ? gaPhysicsData : {}),
            ...(typeof gaChemistryData !== 'undefined' ? gaChemistryData : {}),
            ...(typeof gaBiologyData !== 'undefined' ? gaBiologyData : {}),
            ...(typeof gaHistoryData !== 'undefined' ? gaHistoryData : {}),
            ...(typeof gaGeographyData !== 'undefined' ? gaGeographyData : {}),
            ...(typeof gaPolityData !== 'undefined' ? gaPolityData : {}),
            ...(typeof gaEconomicsData !== 'undefined' ? gaEconomicsData : {}),

            // Older GK Capsules (keeping for legacy support)
            ...(typeof gkHistoryCapsule !== 'undefined' ? gkHistoryCapsule : {}),
            ...(typeof gkPolityCapsule !== 'undefined' ? gkPolityCapsule : {}),
            ...(typeof gkScienceCapsule !== 'undefined' ? gkScienceCapsule : {}),
            ...(typeof gkEconomicsCapsule !== 'undefined' ? gkEconomicsCapsule : {}),
            ...(typeof gkGeographyCapsule !== 'undefined' ? gkGeographyCapsule : {}),
            ...(typeof gkSuperlativesCapsule !== 'undefined' ? gkSuperlativesCapsule : {}),
            ...(typeof gkHistoryMedievalExpanded !== 'undefined' ? gkHistoryMedievalExpanded : {}),
            ...(typeof gkHistoryModernExpanded !== 'undefined' ? gkHistoryModernExpanded : {}),
            ...(typeof gkScienceTables !== 'undefined' ? gkScienceTables : {}),
            ...(typeof gkPolityExpanded !== 'undefined' ? gkPolityExpanded : {}),
            ...(typeof gkGeographyExpanded !== 'undefined' ? gkGeographyExpanded : {}),
            ...(typeof gkEconomicsExpanded !== 'undefined' ? gkEconomicsExpanded : {}),
            ...(typeof gkCapsuleSupplement !== 'undefined' ? gkCapsuleSupplement : {}),
            ...(typeof gkCapsuleFinalTables !== 'undefined' ? gkCapsuleFinalTables : {}),
            
            // Explicitly include PYQ topics if available
            ...(typeof PYQ_BANK !== 'undefined' ? {
                'pyq_math_comp': { title: "Math PYQ Collection", category: "PYQ Vault", subtitle: "Mixed Previous Year Questions", blocks: (PYQ_BANK.math || []).slice(0,15).map(q => ({ title: q.text, text: `Correct Option: ${q.options[q.correctAnswer]}`, shortcut: q.explanation ? q.explanation.trick : "" })) },
                'pyq_gk_comp': { title: "GK PYQ Collection", category: "PYQ Vault", subtitle: "History, Polity, Geography PYQs", blocks: (PYQ_BANK.gk || []).slice(0,15).map(q => ({ title: q.text, text: `Correct Option: ${q.options[q.correctAnswer]}`, shortcut: q.explanation ? q.explanation.trick : "" })) }
            } : {})
        };

        let currentSubject = 'all';
        let currentSearch = '';

        function getSubject(key) {
            if (key.startsWith('math_')) return 'math';
            if (key.startsWith('english_')) return 'english';
            if (key.startsWith('vocab_')) return 'english';
            if (key.startsWith('reasoning_')) return 'reasoning';
            if (key.startsWith('gk_')) return 'gk';
            if (key.startsWith('comp_')) return 'computer';
            if (key.startsWith('stat_')) return 'math';
            if (key.startsWith('pyq_')) return 'pyq';
            return 'other';
        }

        function filterBySubject(subject) {
            currentSubject = subject;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnText = btn.innerText.toLowerCase();
                if (subject === 'all' && btnText.includes('all')) btn.classList.add('active');
                else if (subject === 'math' && btnText.includes('math')) btn.classList.add('active');
                else if (subject === 'english' && btnText.includes('eng')) btn.classList.add('active');
                else if (subject === 'reasoning' && btnText.includes('reas')) btn.classList.add('active');
                else if (subject === 'gk' && btnText.includes('gk')) btn.classList.add('active');
                else if (subject === 'computer' && btnText.includes('comp')) btn.classList.add('active');
                else if (subject === 'pyq' && btnText.includes('pyq')) btn.classList.add('active');
                else if (subject === 'tier2' && btnText.includes('tier')) btn.classList.add('active');
            });
            
            displayTopics();
        }

        function searchTopics(query) {
            currentSearch = query.toLowerCase();
            displayTopics();
        }

        function displayTopics() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = '';
            
            let count = 0;
            for (const [key, topic] of Object.entries(allStudyData)) {
                if (!topic || typeof topic !== 'object' || !topic.title || Array.isArray(topic)) continue;

                const subject = getSubject(key);
                
                let matches = false;
                if (currentSubject === 'all') matches = true;
                else if (currentSubject === 'tier2') {
                    const cat = (topic.category || '').toLowerCase();
                    matches = cat.includes('tier 2') || cat.includes('tier2') || subject === 'computer' || key.includes('advanced');
                } else {
                    matches = (subject === currentSubject);
                }

                const searchMatch = currentSearch === '' || 
                    topic.title.toLowerCase().includes(currentSearch) ||
                    (topic.subtitle && topic.subtitle.toLowerCase().includes(currentSearch)) ||
                    (topic.category && topic.category.toLowerCase().includes(currentSearch));

                if (matches && searchMatch) {
                    const colorClass = ['gold', 'blue', 'green', 'red', 'purple'][count % 5];
                    const icons = { gold: '⭐', blue: '📘', green: '✨', red: '🚀', purple: '💡' };
                    
                    const card = document.createElement('div');
                    card.className = `card ${colorClass}`;
                    card.style.position = 'relative';
                    card.onclick = () => viewTopic(key);
                    
                    const isNew = key.includes('expanded') || key.includes('comprehensive') || key.includes('capsule') || key.includes('vocab_') || key.includes('pyq_');
                    
                    card.innerHTML = `
                        ${isNew ? '<div class="new-badge">NEW CONTENT</div>' : ''}
                        <div class="card-title">
                            <span class="icon">${icons[colorClass]}</span>
                            <span>${topic.title}</span>
                        </div>
                        <div style="color: var(--muted); font-size: 12px; margin-bottom: 12px;">${topic.subtitle || topic.category || ''}</div>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                            <span class="tag tag-${colorClass}">
                                ${topic.blocks ? topic.blocks.length : 0} concepts
                            </span>
                            ${topic.blocks && topic.blocks.some(b => b.examples && b.examples.length > 0) ? `
                                <span class="tag tag-${colorClass}">Examples</span>
                            ` : ''}
                            ${topic.blocks && topic.blocks.some(b => b.shortcut) ? `
                                <span class="tag tag-${colorClass}">⚡ Hacks</span>
                            ` : ''}
                        </div>
                        <div style="margin-top: auto; display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; color: var(--accent${(count%4)+1});">
                            <span>Study This Topic</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    `;
                    grid.appendChild(card);
                    count++;
                }
            }

            }

            // Update status bar
            const totalItems = Object.keys(allStudyData).filter(k => allStudyData[k].title).length;
            const statusEl = document.getElementById('content-status');
            if (statusEl) {
                statusEl.innerHTML = `
                    <div style="background: rgba(25, 135, 84, 0.1); border-left: 4px solid #198754; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-check-circle" style="color: #198754; font-size: 20px;"></i> 
                        <span><strong>SUCCESS:</strong> ${totalItems} modules and 2,500+ practice points are currently integrated and ready for study.</span>
                    </div>
                `;
            }
        }

        // View topic detail
        function viewTopic(key) {
            currentTopic = key;
            const topic = allStudyData[key];
            
            document.getElementById('topics-grid').style.display = 'none';
            document.getElementById('topic-detail').style.display = 'block';
            
            let content = `
                <h2 style="font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px;">${topic.title}</h2>
                <p style="color: var(--muted); font-size: 15px; margin-bottom: 24px;">${topic.subtitle || topic.category}</p>
                <div class="divider"></div>
            `;

            if (topic.blocks && Array.isArray(topic.blocks)) {
                topic.blocks.forEach((block, idx) => {
                    const colors = ['gold', 'blue', 'green', 'red', 'purple'];
                    const color = colors[idx % 5];
                    
                    content += `
                        <div class="card ${color}">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h3>${block.title}</h3>
                                <button class="btn btn-secondary" onclick="speakText(this.getAttribute('data-text'))" data-text="${encodeURIComponent(block.text)}" style="padding: 4px 8px; font-size: 12px;"><i class="fa-solid fa-volume-up"></i> Listen</button>
                            </div>
                            <p>${block.text}</p>
                    `;

                    if (block.examples && block.examples.length > 0) {
                        content += `<div style="margin-top: 12px;"><strong style="color: var(--accent3);">Examples:</strong><ul style="margin-top: 8px;">`;
                        block.examples.forEach(ex => {
                            content += `<li>${ex}</li>`;
                        });
                        content += `</ul></div>`;
                    }

                    if (block.shortcut) {
                        content += `<div class="shortcut" style="margin-top: 12px;"><strong>⚡ Speed Hack:</strong> ${block.shortcut}</div>`;
                    }

                    content += `</div>`;
                });
            }

            document.getElementById('topic-content').innerHTML = content;
            window.scrollTo(0, 0);
        }

        // Close topic view
        function closeTopic() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            currentTopic = null;
            document.getElementById('topics-grid').style.display = 'grid';
            document.getElementById('topic-detail').style.display = 'none';
            displayTopics();
            window.scrollTo(0, 0);
        }

        // Start quiz
        function startQuiz() {
            window.location.href = 'exam.html';
        }

        // Go home
        function goHome() {
            window.location.href = 'index.html';
        }

        // Text to Speech
        let currentUtterance = null;
        function speakText(encodedText) {
            const text = decodeURIComponent(encodedText);
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if (currentUtterance && currentUtterance.text === text) {
                        currentUtterance = null;
                        return;
                    }
                }
                currentUtterance = new SpeechSynthesisUtterance(text);
                // Try to find a good English voice
                const voices = window.speechSynthesis.getVoices();
                const enVoice = voices.find(v => v.lang.startsWith('en-GB') || v.lang.startsWith('en-US'));
                if (enVoice) currentUtterance.voice = enVoice;
                
                window.speechSynthesis.speak(currentUtterance);
            } else {
                alert("Text to speech is not supported in your browser.");
            }
        }

        // Initialize
        displayTopics();
    </script>
</body>
</html>
