<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Exam Simulator - Study Master</title>
    <link rel="stylesheet" href="css/modern_theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-badge">SSC CGL Complete Preparation</div>
        <h1>Study Master Platform</h1>
        <p>111 comprehensive topics with 1500+ worked examples, 400+ speed hacks &amp; complete exam coverage</p>
        <div class="hero-stats">
            <div class="stat">
                <div class="stat-num">111</div>
                <div class="stat-label">Topics</div>
            </div>
            <div class="stat">
                <div class="stat-num">1500+</div>
                <div class="stat-label">Examples</div>
            </div>
            <div class="stat">
                <div class="stat-num">400+</div>
                <div class="stat-label">Speed Hacks</div>
            </div>
            <div class="stat">
                <div class="stat-num">6</div>
                <div class="stat-label">Subjects</div>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-wrapper">
        <div class="nav">
            <button class="nav-btn active" onclick="filterBySubject('all', this)">All</button>
            <button class="nav-btn" onclick="filterBySubject('math', this)">📐 Math</button>
            <button class="nav-btn" onclick="filterBySubject('english', this)">📚 English</button>
            <button class="nav-btn" onclick="filterBySubject('reasoning', this)">🧠 Reasoning</button>
            <button class="nav-btn" onclick="filterBySubject('gk', this)">🌍 GK</button>
            <button class="nav-btn" onclick="filterBySubject('computer', this)">💻 Comp</button>
            <button class="nav-btn" onclick="filterBySubject('pyq', this)">📂 PYQ Vault</button>
            <button class="nav-btn" onclick="filterBySubject('tier1', this)" style="color: var(--accent2);">🎯 Tier-1 Focus</button>
            <button class="nav-btn" onclick="filterBySubject('tier2', this)" style="color: var(--accent4);">🏆 Tier-2 Focus</button>
            <button class="nav-btn" style="margin-left: auto;" onclick="goHome()"><i class="fas fa-home"></i> Home</button>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="container">
        <!-- Search & Filter Section -->
        <div style="margin-bottom: 32px;">
            <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;">
                <input type="text" id="search-bar" placeholder="Search topics (e.g., Quadratic Equations)..."
                       style="flex: 1; min-width: 250px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;"
                       onkeyup="searchTopics(this.value)">
                <button class="btn" onclick="startQuiz()">
                    <i class="fas fa-play"></i> Start Quiz
                </button>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                <button class="level-btn nav-btn active" onclick="filterByLevel('all', this)">All Levels</button>
                <button class="level-btn nav-btn" onclick="filterByLevel('foundation', this)">Foundation</button>
                <button class="level-btn nav-btn" onclick="filterByLevel('exam', this)">Exam</button>
                <button class="level-btn nav-btn" onclick="filterByLevel('advanced', this)">Advanced</button>
            </div>
            <div id="active-filters" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
        </div>

        <!-- Topics Grid -->
        <div id="topics-grid" class="topics-grid">
            <!-- Topics loaded here by JavaScript -->
        </div>

        <style>
            .topics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-bottom: 40px;
            }
            @media (max-width: 1024px) { .topics-grid { grid-template-columns: repeat(2, 1fr); } }
            @media (max-width: 650px)  { .topics-grid { grid-template-columns: 1fr; gap: 16px; } }
        </style>

        <!-- Topic Detail View -->
        <div id="topic-detail" style="display: none;">
            <button class="btn btn-secondary" onclick="closeTopic()">← Back to Topics</button>
            <div id="topic-content" style="margin-top: 24px;"></div>
        </div>
    </div>

    <!-- =====================================================================
         DATA BANKS  (order matters – load before inline script)
         FIX #1 & #2: Added gk_tips.js so gkData is available.
         Removed gk_bank.js from study page (that's exam-only data).
    ====================================================================== -->
    <script src="js/data/math_theorems.js"></script>
    <script src="js/data/english_rules.js"></script>
    <script src="js/data/english_vocabulary_comprehensive.js"></script>
    <script src="js/data/reasoning_tricks.js"></script>
    <script src="js/data/gk_tips.js"></script>               <!-- FIX #2: was missing -->
    <script src="js/data/ga_biology_capsule.js"></script>
    <script src="js/data/ga_chemistry_capsule.js"></script>
    <script src="js/data/ga_economics_capsule.js"></script>
    <script src="js/data/ga_geography_capsule.js"></script>
    <script src="js/data/ga_history_capsule.js"></script>
    <script src="js/data/ga_physics_capsule.js"></script>
    <script src="js/data/ga_polity_capsule.js"></script>
    <script src="js/data/gk_comprehensive_expanded.js"></script>
    <script src="js/data/gk_capsule_final_tables.js"></script>
    <script src="js/data/gk_history_medieval_expanded.js"></script>
    <script src="js/data/gk_history_modern_expanded.js"></script>
    <script src="js/data/gk_science_tables.js"></script>
    <script src="js/data/pyq_bank.js"></script>
    <script src="js/data/computer_knowledge.js"></script>
    <script src="js/data/statistics_advanced.js"></script>

    <script>
        // =====================================================================
        // FIX #1 & #6: Use gkData (study blocks) instead of GKBank (exam Q bank).
        // Spreading GKBank was wrong — it added raw exam questions + a function
        // as entries in allStudyData, producing broken / undefined-title cards.
        // =====================================================================
        const allStudyData = {
            ...mathData,
            ...englishData,
            ...englishVocabularyData,   // vocab_ prefix keys
            ...reasoningData,
            ...gkData,                  // FIX: was ...GKBank (wrong format)
            ...gaBiologyData,
            ...gaChemistryData,
            ...gaEconomicsData,
            ...gaGeographyData,
            ...gaHistoryData,
            ...gaPhysicsData,
            ...gaPolityData,
            ...gkDataExpanded,
            ...gkCapsuleFinalTables,
            ...gkHistoryMedievalExpanded,
            ...gkHistoryModernExpanded,
            ...gkScienceTables,
            ...computerData,
            ...statisticsData,          // stat_ prefix keys

            // PYQ Vault synthetic entries
            pyq_2024_math: {
                title: 'Math PYQs (2019–2024)',
                category: 'PYQ Vault',
                subtitle: 'Authentic Arithmetic & Algebra from past papers',
                blocks: PYQ_BANK.math.map(q => ({
                    title: q.text,
                    text: 'Correct Answer: ' + (q.options[q.correctAnswer] || '—'),
                    examples: q.explanation
                        ? [q.explanation.standard || '', q.explanation.trick || ''].filter(Boolean)
                        : []
                }))
            },
            pyq_2024_reasoning: {
                title: 'Reasoning PYQs (2019–2024)',
                category: 'PYQ Vault',
                subtitle: 'Series, Coding-Decoding, Analogies from past papers',
                blocks: PYQ_BANK.reasoning.map(q => ({
                    title: q.text,
                    text: 'Correct Answer: ' + (q.options[q.correctAnswer] || '—'),
                    examples: q.explanation
                        ? [q.explanation.standard || '', q.explanation.trick || ''].filter(Boolean)
                        : []
                }))
            },
            pyq_2024_english: {
                title: 'English PYQs (2019–2024)',
                category: 'PYQ Vault',
                subtitle: 'Synonyms, Antonyms, Error Detection from past papers',
                blocks: PYQ_BANK.english.map(q => ({
                    title: q.text,
                    text: 'Correct Answer: ' + (q.options[q.correctAnswer] || '—'),
                    examples: q.explanation
                        ? [q.explanation.standard || '', q.explanation.trick || ''].filter(Boolean)
                        : []
                }))
            },
            pyq_2024_gk: {
                title: 'GA/GK PYQs (2019–2024)',
                category: 'PYQ Vault',
                subtitle: 'Current Affairs & Static GK from past papers',
                blocks: PYQ_BANK.gk.map(q => ({
                    title: q.text,
                    text: 'Correct Answer: ' + (q.options[q.correctAnswer] || '—'),
                    examples: q.explanation
                        ? [q.explanation.standard || '', q.explanation.trick || ''].filter(Boolean)
                        : []
                }))
            }
        };

        // =====================================================================
        // FIX #3, #4, #5: Extended getSubject() to handle every key prefix
        // used in the data files.  Previously vocab_ and stat_ fell through
        // to 'other', breaking subject filters.
        // =====================================================================
        function getSubject(key) {
            if (key.startsWith('math_'))      return 'math';
            if (key.startsWith('stat_'))      return 'math';     // statistics lives under Math filter
            if (key.startsWith('english_'))   return 'english';
            if (key.startsWith('vocab_'))     return 'english';  // FIX #3: vocab_ → english
            if (key.startsWith('reasoning_')) return 'reasoning';
            if (key.startsWith('gk_'))        return 'gk';
            if (key.startsWith('ga_'))        return 'gk';
            if (key.startsWith('comp_'))      return 'computer';
            if (key.startsWith('pyq_'))       return 'pyq';
            return 'other';
        }

        function isTier2Topic(key, topic, subject) {
            const text = `${topic.title || ''} ${topic.subtitle || ''} ${topic.category || ''}`.toLowerCase();
            if (key.startsWith('stat_')) return true;
            if (subject === 'computer') return true;
            if (text.includes('tier 2') || text.includes('tier-2') || text.includes('tier2')) return true;
            if (text.includes('advanced') || text.includes('probability') || text.includes('data interpretation')) return true;
            if (text.includes('cloze') || text.includes('parajumble') || text.includes('reading comprehension')) return true;
            if (text.includes('seating arrangement') || text.includes('syllogism')) return true;
            return false;
        }

        function getLevel(key, topic, subject) {
            const text = `${topic.title || ''} ${topic.subtitle || ''} ${topic.category || ''}`.toLowerCase();
            if (text.includes('foundation') || text.includes('basics') || text.includes('introduction') || text.includes('core')) return 'foundation';
            if (isTier2Topic(key, topic, subject) || text.includes('advanced') || text.includes('practice') || text.includes('deep dive') || text.includes('revision')) return 'advanced';
            return 'exam';
        }

        function getTopicReliability(topic) {
            const blocks = Array.isArray(topic.blocks) ? topic.blocks : [];
            let score = 0;

            score += Math.min(blocks.length, 4);
            score += blocks.reduce((total, block) => total + (Array.isArray(block.examples) ? Math.min(block.examples.length, 3) * 0.5 : 0), 0);
            score += blocks.reduce((total, block) => total + (block.shortcut ? 1 : 0), 0);
            score += blocks.reduce((total, block) => total + (Array.isArray(block.practiceProblems) ? 0.75 : 0), 0);
            score += blocks.reduce((total, block) => total + (Array.isArray(block.miniQuiz) ? 0.75 : 0), 0);

            return Math.max(1, Math.min(10, Math.round(score)));
        }

        function getReliabilityLabel(score) {
            if (score >= 8) return { label: 'High', color: 'green' };
            if (score >= 5) return { label: 'Medium', color: 'blue' };
            return { label: 'Needs Work', color: 'red' };
        }

        function buildDeepNotes(topic, subject, level) {
            const text = `${topic.title || ''} ${topic.subtitle || ''} ${topic.category || ''}`.toLowerCase();
            const notes = [];

            const add = (title, items) => {
                if (!items || items.length === 0) return;
                notes.push({ title, items });
            };

            const generic = [
                `Read this topic as a question-answer set, not as a paragraph to memorize.`,
                `In SSC, this topic usually appears as direct fact recall, option elimination, or one-step concept application.`,
                `Your goal is to know the definition, one core rule/formula, one typical trap, and one fast elimination clue.`,
                `If the topic looks short, rely on the deeper examples, shortcut, and related subjects around it.`
            ];

            if (subject === 'math') {
                add('Core Study Notes', [
                    'Start from the formula or rule. If a topic has a direct formula, write it first before attempting examples.',
                    'Check whether the question is asking for exact value, ratio, comparison, or approximation.',
                    'For arithmetic topics, convert wording into equations, ratios, or fractions.',
                    'For geometry and mensuration, draw the figure and mark known values immediately.'
                ]);
                if (text.includes('probability')) add('Probability Focus', ['List total outcomes first.', 'Use complement when the phrase says at least one or none.', 'For multi-step draws, update the denominator if there is no replacement.']);
                if (text.includes('ratio') || text.includes('proportion') || text.includes('partnership')) add('Ratio Focus', ['Use a common unit before comparing quantities.', 'In partnership, contribution = capital × time.', 'Reduce the final ratio before answering.']);
                if (text.includes('average') || text.includes('mixture') || text.includes('alligation')) add('Average and Mixture Focus', ['Weighted average is the base idea.', 'If average increases, the new value is above the old average.', 'For alligation, use deviation from mean to get mixing ratio.']);
                if (text.includes('geometry') || text.includes('mensuration') || text.includes('trigonometry') || text.includes('coordinate')) add('Geometry Focus', ['Draw a clean diagram.', 'Write the standard formula on the side.', 'Look for a right triangle, symmetry, or a standard shape before calculating.']);
                if (text.includes('permutation') || text.includes('combination')) add('Counting Focus', ['If order matters, use permutation.', 'If selection matters, use combination.', 'When restrictions appear, solve total minus forbidden cases.']);
                if (text.includes('logarithm') || text.includes('indices') || text.includes('surd')) add('Algebraic Power Focus', ['Convert logs to powers when possible.', 'Use exponent laws to compress expressions.', 'Rationalize surds only after simplifying common factors.']);
                add('Common SSC Traps', [
                    'Misreading “at least” as a single-case question.',
                    'Forgetting units in mensuration and speed questions.',
                    'Applying formula before identifying whether the problem is direct, inverse, or mixed.'
                ]);
            } else if (subject === 'english') {
                add('Core Study Notes', [
                    'English questions usually test grammar first and meaning second.',
                    'Always scan for subject-verb agreement, tense consistency, and preposition control.',
                    'If two answers seem close, the better one usually fits context, tone, and idiomatic usage more cleanly.',
                    'Read the whole sentence before selecting the blank or correction.'
                ]);
                if (text.includes('noun') || text.includes('pronoun')) add('Noun and Pronoun Focus', ['Check countability and plurality.', 'Use objective pronouns after prepositions and verbs like let.', 'Keep pronoun reference clear.']);
                if (text.includes('verb') || text.includes('tense') || text.includes('voice') || text.includes('narration')) add('Verb System Focus', ['Do not change tense randomly.', 'In passive voice, preserve the tense structure with be + V3.', 'In narration, shift pronouns and time words carefully.']);
                if (text.includes('article') || text.includes('determiner') || text.includes('quantifier')) add('Article Focus', ['Use article by sound, not spelling.', 'A/an for nonspecific singular nouns.', 'The for known, unique, or already mentioned items.']);
                if (text.includes('cloze') || text.includes('para') || text.includes('completion') || text.includes('editing')) add('Reading and Editing Focus', ['Check logic flow from sentence to sentence.', 'Use transition words to identify contrast or continuation.', 'Omission questions often hide articles, auxiliaries, or prepositions.']);
                if (text.includes('vocabulary') || text.includes('word power') || text.includes('synonym') || text.includes('antonym')) add('Vocabulary Focus', ['Choose the meaning that matches the sentence context.', 'Learn pairs that are often confused.', 'Use root-word memory for one-word substitutions.']);
                add('Common SSC Traps', [
                    'Grammatically correct but contextually wrong options.',
                    'Overlooking preposition collocations.',
                    'Choosing a synonym that is too strong or too weak for the sentence tone.'
                ]);
            } else if (subject === 'reasoning') {
                add('Core Study Notes', [
                    'Reasoning works best when you convert text into symbols, arrows, tables, or diagrams.',
                    'Lock fixed clues first and then derive the rest.',
                    'For every question, decide whether it is about sequence, relation, arrangement, or logic.',
                    'If a question looks long, split it into smaller clue groups before solving.'
                ]);
                if (text.includes('sequence') || text.includes('series')) add('Series Focus', ['Check differences, ratios, and alternating patterns.', 'Look at position-based patterns if the sequence is mixed.', 'Do not assume a pattern too early.']);
                if (text.includes('seating') || text.includes('ranking') || text.includes('arrangement')) add('Arrangement Focus', ['Fix one reference point first.', 'Use row or circle orientation carefully.', 'Draw slots and place absolute clues before relative clues.']);
                if (text.includes('syllogism') || text.includes('statement') || text.includes('assumption') || text.includes('conclusion')) add('Logic Focus', ['Do not reverse a statement unless the rule permits it.', 'Check whether the conclusion is too strong.', 'Use the negation test for assumption-style questions.']);
                if (text.includes('direction') || text.includes('clock') || text.includes('calendar')) add('Spatial and Time Focus', ['Track movement step by step.', 'Separate facing direction from displacement.', 'Use formula-based solving for clock and date questions.']);
                if (text.includes('coding') || text.includes('decoding')) add('Coding Focus', ['Look for shifts, reversals, and alphabet mapping.', 'Try one known example first.', 'Track position-based changes separately if the pattern is mixed.']);
                add('Common SSC Traps', [
                    'Confusing “nearest” and “farthest” in relations.',
                    'Missing an odd/even position rule in series.',
                    'Using memory instead of a quick rough diagram.'
                ]);
            } else if (subject === 'gk') {
                add('Core Study Notes', [
                    'GK is mostly retention plus elimination.',
                    'One topic can hide a direct factual question, a matching question, or a current-affairs link.',
                    'Make one-line anchors: who, what, when, where, why.',
                    'Revise GK in short cycles; repetition matters more than long reading.'
                ]);
                if (text.includes('history')) add('History Focus', ['Link event with year and personality.', 'Learn the sequence of dynasties, movements, and reforms.', 'Separate ancient, medieval, and modern facts clearly.']);
                if (text.includes('geography')) add('Geography Focus', ['Visualize on a map when possible.', 'Connect river-source-mouth, mountain-pass-state, and capital-state pairs.', 'Remember world geography with location pairs.']);
                if (text.includes('science')) add('Science Focus', ['Pair organ-function, law-definition, and unit-concept facts.', 'Revise vitamins, hormones, and common physics units.', 'Prefer one fact per line, not long paragraphs.']);
                if (text.includes('polity') || text.includes('economy')) add('Polity and Economy Focus', ['Separate constitutional facts from policy terms.', 'Know article numbers, office holders, and financial terms as quick anchors.', 'Treat direct tax, indirect tax, fiscal policy, and monetary policy as different buckets.']);
                if (text.includes('sports')) add('Sports Focus', ['Anchor one player with one sport and one achievement.', 'Know major tournament hosts and winners.', 'Use recent-event revision for current affairs questions.']);
                add('Common SSC Traps', [
                    'Confusing similar-sounding places, people, or years.',
                    'Mixing statutory and constitutional bodies.',
                    'Forgetting one key exception that changes the whole option.'
                ]);
            } else if (subject === 'computer') {
                add('Core Study Notes', [
                    'Computer topics are easiest when you map each term to its exact function.',
                    'Know the difference between hardware, software, network, storage, and security terms.',
                    'For practical-style questions, recall the keyboard shortcut or process flow.',
                    'If the topic has a protocol or tool, memorize what it does and where it is used.'
                ]);
                if (text.includes('network') || text.includes('protocol')) add('Networking Focus', ['Protocol means rule set for communication.', 'Know device roles: router, switch, hub.', 'Map services to ports and layer behavior.']);
                if (text.includes('database') || text.includes('sql') || text.includes('dbms')) add('DBMS Focus', ['Primary key is unique and not null.', 'Know the core SQL commands and join types.', 'Normalization reduces redundancy and inconsistency.']);
                if (text.includes('excel') || text.includes('spreadsheet')) add('Spreadsheet Focus', ['Formula syntax is basic but must be exact.', 'Absolute references use $ signs.', 'Lookup and filter questions test workflow knowledge.']);
                if (text.includes('security') || text.includes('cyber')) add('Security Focus', ['Separate authentication, authorization, and encryption.', 'Know the common attack names and defenses.', 'Always identify whether a question is about identity, access, or protection.']);
                if (text.includes('ai') || text.includes('ml') || text.includes('emerging')) add('Emerging Tech Focus', ['AI is broad, ML is data-based, deep learning is neural-network based.', 'Cloud, IoT, blockchain, and cybersecurity are recurring themes.', 'Be ready to classify examples by the right technology bucket.']);
                add('Common SSC Traps', [
                    'Mixing up input and output devices.',
                    'Confusing protocol names with device names.',
                    'Forgetting the exact function of a command or software tool.'
                ]);
            }

            notes.push({ title: 'Exam Pattern Note', items: [
                `This topic is currently tagged as ${level.toUpperCase()} level, so the exam usually asks it in ${level === 'foundation' ? 'definition and direct-fact form' : level === 'advanced' ? 'multi-step or trap-based form' : 'balanced concept-check form'}.`,
                `Use the examples, shortcuts, and mini quiz as your first revision layer before moving to full practice questions.`
            ]});

            notes.push({ title: 'Quick Revision Sheet', items: generic });

            return `
                <div class="card blue" style="margin-top:18px; border-left:4px solid var(--accent2);">
                    <h3 style="margin-top:0;">Deep Study Notes</h3>
                    ${notes.map(section => `
                        <div style="margin-top:14px;">
                            <h4 style="margin:0 0 8px; color:var(--text);">${section.title}</h4>
                            <ul style="margin:0; padding-left:20px; color:var(--text);">
                                ${section.items.map(item => `<li style="margin-bottom:6px;">${item}</li>`).join('')}
                            </ul>
                        </div>
                    `).join('')}
                </div>`;
        }

        function buildExamLens(topic, subject, level) {
            const keyText = `${topic.title || ''} ${topic.subtitle || ''} ${topic.category || ''}`.toLowerCase();
            const subjectHints = {
                math: [
                    'Write the formula first before solving.',
                    'Check units, signs, and approximation if options are close.',
                    'Use elimination on answer choices when exact calculation is long.'
                ],
                english: [
                    'Check grammar before meaning.',
                    'If two options seem correct, prefer the one matching tone and context.',
                    'Look for article, tense, preposition, and pronoun traps.'
                ],
                reasoning: [
                    'Convert clues into symbols or arrows on paper.',
                    'Check direction, sequence, and negation carefully.',
                    'Use elimination after locking one fixed clue.'
                ],
                gk: [
                    'Memorize one anchor fact, one date, and one elimination clue.',
                    'Prefer the option most consistent with standard SSC facts.',
                    'Avoid overthinking when the question is a direct one-liner.'
                ],
                computer: [
                    'Match the term with its function, layer, or device role.',
                    'Use a process-of-elimination approach for protocol and command questions.',
                    'Remember standard definitions and keyboard shortcuts.'
                ]
            };

            const extraHints = [];
            if (keyText.includes('probability') || keyText.includes('ratio') || keyText.includes('average') || keyText.includes('alligation')) {
                extraHints.push('Translate the question into a ratio, table, or fraction first.');
            }
            if (keyText.includes('geometry') || keyText.includes('mensuration') || keyText.includes('trigonometry') || keyText.includes('coordinate')) {
                extraHints.push('Draw a diagram and label known values before calculations.');
            }
            if (keyText.includes('cloze') || keyText.includes('editing') || keyText.includes('narration') || keyText.includes('para')) {
                extraHints.push('Read one sentence before and after the target line before selecting an answer.');
            }
            if (keyText.includes('seating') || keyText.includes('ranking') || keyText.includes('clock') || keyText.includes('calendar')) {
                extraHints.push('Use a rough diagram or timeline rather than mental tracking only.');
            }
            if (keyText.includes('dbms') || keyText.includes('sql') || keyText.includes('network') || keyText.includes('cyber')) {
                extraHints.push('Map the term to its exact job: store, connect, send, secure, or query.');
            }
            if (keyText.includes('budget') || keyText.includes('policy') || keyText.includes('economy') || keyText.includes('inflation')) {
                extraHints.push('Separate definition questions from current-affairs questions before answering.');
            }

            const hints = [...subjectHints[subject] || [], ...extraHints].slice(0, 4);
            const supportLevel = level === 'foundation' ? 'build the base definition first' : level === 'advanced' ? 'focus on exam shortcuts and trap avoidance' : 'balance concept and question practice';

            return `
                <div class="card blue" style="margin-top:18px; border-left:4px solid var(--accent2);">
                    <h3 style="margin-top:0;">Exam Lens</h3>
                    <p style="margin-bottom:12px; color:var(--muted);">This topic is best used to ${supportLevel}.</p>
                    <ul style="margin:0; padding-left:20px;">
                        ${hints.map(hint => `<li>${hint}</li>`).join('')}
                    </ul>
                </div>`;
        }

        let currentFilter = 'all';
        let currentLevelFilter = 'all';
        let currentSearch = '';
        let currentTopic  = null;

        // Update active nav button
        function setActiveBtn(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        function filterBySubject(subject, btn) {
            currentFilter = subject;
            currentSearch = '';
            document.getElementById('search-bar').value = '';
            document.getElementById('topics-grid').style.display = 'grid';
            document.getElementById('topic-detail').style.display = 'none';
            currentTopic = null;
            setActiveBtn(btn);
            displayTopics();
            window.scrollTo(0, 0);
        }

        function filterByLevel(level, btn) {
            currentLevelFilter = level;
            currentSearch = '';
            document.getElementById('search-bar').value = '';
            document.getElementById('topics-grid').style.display = 'grid';
            document.getElementById('topic-detail').style.display = 'none';
            currentTopic = null;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            displayTopics();
            window.scrollTo(0, 0);
        }

        function searchTopics(query) {
            currentSearch = query.toLowerCase();
            displayTopics();
        }

        function displayTopics() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = '';
            let count = 0;
            const subjectOrder = ['math', 'english', 'reasoning', 'gk', 'computer', 'pyq'];
            const subjectLabels = {
                math: 'Math',
                english: 'English',
                reasoning: 'Reasoning',
                gk: 'GK',
                computer: 'Computer',
                pyq: 'PYQ Vault'
            };
            const levelOrder = ['foundation', 'exam', 'advanced'];
            const levelLabels = {
                foundation: 'Foundation',
                exam: 'Exam',
                advanced: 'Advanced'
            };
            const buckets = {};

            for (const [key, topic] of Object.entries(allStudyData)) {
                // Guard: skip non-objects and entries without a title (e.g. stray keys)
                if (!topic || typeof topic !== 'object' || Array.isArray(topic)) continue;
                if (!topic.title) continue;

                const subject = getSubject(key);

                // ── subject filter ──────────────────────────────────────────
                let matches = false;
                if (currentFilter === 'all') {
                    matches = true;
                } else if (currentFilter === 'tier1') {
                    matches = subject !== 'pyq' && !isTier2Topic(key, topic, subject);
                } else if (currentFilter === 'tier2') {
                    matches = isTier2Topic(key, topic, subject);
                } else {
                    matches = (subject === currentFilter);
                }

                if (matches && currentLevelFilter !== 'all') {
                    matches = getLevel(key, topic, subject) === currentLevelFilter;
                }

                // ── search filter ────────────────────────────────────────────
                const searchMatch = !currentSearch
                    || topic.title.toLowerCase().includes(currentSearch)
                    || (topic.subtitle  && topic.subtitle.toLowerCase().includes(currentSearch))
                    || (topic.category  && topic.category.toLowerCase().includes(currentSearch));

                if (!matches || !searchMatch) continue;

                const level = getLevel(key, topic, subject);
                if (!buckets[subject]) buckets[subject] = {};
                if (!buckets[subject][level]) buckets[subject][level] = [];
                buckets[subject][level].push({ key, topic });
                count++;
            }

            const renderTopicCard = (key, topic, color) => {
                const hasExamples = topic.blocks && topic.blocks.some(b => b.examples && b.examples.length > 0);
                const hasHacks    = topic.blocks && topic.blocks.some(b => b.shortcut);
                const level = getLevel(key, topic, getSubject(key));

                return `
                    <div class="card ${color}">
                        <div class="card-title">
                            <span class="icon">${{ gold: '⭐', blue: '📘', green: '✨', red: '🚀', purple: '💡' }[color]}</span>
                            <span>${topic.title}</span>
                        </div>
                        <div style="color:var(--muted);font-size:12px;margin-bottom:8px;">${topic.subtitle || topic.category || ''}</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
                            <span class="tag tag-${color}">${topic.blocks ? topic.blocks.length : 0} blocks</span>
                            <span class="tag tag-${color}">${level.charAt(0).toUpperCase() + level.slice(1)}</span>
                            ${hasExamples ? `<span class="tag tag-${color}">Examples</span>` : ''}
                            ${hasHacks    ? `<span class="tag tag-${color}">⚡ Hacks</span>`  : ''}
                        </div>
                        <button class="btn" style="width:100%;" onclick="viewTopic('${key}')">View Details</button>
                    </div>`;
            };

            const subjectSections = subjectOrder.filter(subject => buckets[subject]);

            if (subjectSections.length > 0) {
                let colorIndex = 0;
                grid.style.display = 'grid';
                grid.innerHTML = '';

                subjectSections.forEach(subject => {
                    grid.innerHTML += `
                        <div style="grid-column:1/-1;margin:8px 0 4px;">
                            <h2 style="font-family:'Playfair Display',serif;font-size:24px;margin:0 0 6px;color:var(--text);">${subjectLabels[subject] || subject}</h2>
                            <div style="height:1px;background:var(--border);opacity:.7;"></div>
                        </div>`;

                    levelOrder.forEach(level => {
                        const topics = buckets[subject][level] || [];
                        if (topics.length === 0) return;

                        grid.innerHTML += `
                            <div style="grid-column:1/-1;margin:10px 0 0;">
                                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                                    <span class="tag tag-gold">${levelLabels[level]}</span>
                                    <span style="color:var(--muted);font-size:13px;">${topics.length} topic${topics.length === 1 ? '' : 's'}</span>
                                </div>
                            </div>`;

                        topics.forEach(({ key, topic }) => {
                            const colors = ['gold', 'blue', 'green', 'red', 'purple'];
                            const color = colors[colorIndex % 5];
                            grid.insertAdjacentHTML('beforeend', renderTopicCard(key, topic, color));
                            colorIndex++;
                        });
                    });
                });
            }

            if (count === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px 20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🔍</div>
                        <h3>No topics found</h3>
                        <p style="color:var(--muted);">Try a different search or filter</p>
                    </div>`;
            }
        }

        function viewTopic(key) {
            const topic = allStudyData[key];
            if (!topic) return;
            currentTopic = key;
            const subject = getSubject(key);
            const level = getLevel(key, topic, subject);
            const reliability = getTopicReliability(topic);
            const reliabilityInfo = getReliabilityLabel(reliability);

            document.getElementById('topics-grid').style.display  = 'none';
            document.getElementById('topic-detail').style.display = 'block';

            let content = `
                <h2 style="font-family:'Playfair Display',serif;font-size:32px;margin-bottom:8px;">${topic.title}</h2>
                <p style="color:var(--muted);font-size:15px;margin-bottom:24px;">${topic.subtitle || topic.category || ''}</p>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">
                    <span class="tag tag-${reliabilityInfo.color}">Reliability: ${reliabilityInfo.label} (${reliability}/10)</span>
                    <span class="tag tag-gold">${level.charAt(0).toUpperCase() + level.slice(1)} Level</span>
                    <span class="tag tag-blue">${subjectLabels(subject)}</span>
                </div>
                <div class="divider"></div>`;

            function subjectLabels(subjectId) {
                return {
                    math: 'Math',
                    english: 'English',
                    reasoning: 'Reasoning',
                    gk: 'GK',
                    computer: 'Computer',
                    pyq: 'PYQ Vault'
                }[subjectId] || subjectId;
            }

            if (topic.blocks && Array.isArray(topic.blocks)) {
                content += buildDeepNotes(topic, subject, level);
                topic.blocks.forEach((block, idx) => {
                    const colors = ['gold','blue','green','red','purple'];
                    const color  = colors[idx % 5];
                    const blockHasQuiz = (block.miniQuiz && block.miniQuiz.length > 0)
                        || (block.practiceProblems && block.practiceProblems.length > 0);

                    // Safely encode text for the data attribute
                    const safeText = (block.text || '').replace(/"/g, '&quot;');

                    content += `
                        <div class="card ${color}">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <h3>${block.title || ''}</h3>
                                <button class="btn btn-secondary"
                                    onclick="speakText(this.dataset.text)"
                                    data-text="${safeText}"
                                    style="padding:4px 8px;font-size:12px;">
                                    <i class="fa-solid fa-volume-up"></i> Listen
                                </button>
                            </div>
                            <p>${block.text || ''}</p>`;

                    if (block.examples && block.examples.length > 0) {
                        content += `<div style="margin-top:12px;"><strong style="color:var(--accent3);">Examples:</strong><ul style="margin-top:8px;">`;
                        block.examples.forEach(ex => { content += `<li>${ex}</li>`; });
                        content += `</ul></div>`;
                    }

                    if (block.shortcut) {
                        content += `<div class="shortcut" style="margin-top:12px;"><strong>⚡ Speed Hack:</strong> ${block.shortcut}</div>`;
                    }

                    if (block.practiceProblems && block.practiceProblems.length > 0) {
                        content += `<div style="margin-top:12px;"><strong style="color:var(--accent2);">Mini Quiz (Self-check):</strong><ul style="margin-top:8px;">`;
                        block.practiceProblems.forEach(q => { content += `<li>${q}</li>`; });
                        content += `</ul></div>`;
                    }

                    if (block.miniQuiz && block.miniQuiz.length > 0) {
                        content += `<div style="margin-top:12px;"><strong style="color:var(--accent4);">Quick Quiz:</strong>`;
                        block.miniQuiz.forEach((q, qIdx) => {
                            content += `
                                <details style="margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:8px;">
                                    <summary style="cursor:pointer;font-weight:600;">Q${qIdx + 1}. ${q.q}</summary>
                                    <div style="margin-top:8px;color:var(--muted);">Answer: <strong style="color:var(--text);">${q.answer}</strong></div>
                                    ${q.explanation ? `<div style="margin-top:4px;font-size:13px;">${q.explanation}</div>` : ''}
                                </details>`;
                        });
                        content += `</div>`;
                    }

                    if (blockHasQuiz) {
                        content += `<div class="tag tag-${color}" style="margin-top:10px;display:inline-block;">Quiz Ready</div>`;
                    }

                    if (idx === 0) {
                        content += buildExamLens(topic, subject, level);
                        if (reliability <= 4) {
                            content += `<div class="card red" style="margin-top:18px;border-left:4px solid #dc3545;">
                                <h3 style="margin-top:0;">Content Warning</h3>
                                <p style="margin-bottom:0;">This topic is still thin for exam use. Treat it as a starter and rely on the exam lens plus source-level question practice.</p>
                            </div>`;
                        }
                    }

                    content += `</div>`;
                });
            }

            document.getElementById('topic-content').innerHTML = content;
            window.scrollTo(0, 0);
        }

        function closeTopic() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            currentTopic = null;
            document.getElementById('topics-grid').style.display  = 'grid';
            document.getElementById('topic-detail').style.display = 'none';
            displayTopics();
            window.scrollTo(0, 0);
        }

        function startQuiz() { window.location.href = 'exam.html'; }
        function goHome()    { window.location.href = 'index.html'; }

        // Text-to-Speech  (data passed directly, no URL-encoding needed now)
        let currentUtterance = null;
        function speakText(text) {
            if (!('speechSynthesis' in window)) { alert('TTS not supported in this browser.'); return; }
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (currentUtterance && currentUtterance.text === text) { currentUtterance = null; return; }
            }
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const enVoice = voices.find(v => v.lang.startsWith('en-GB') || v.lang.startsWith('en-US'));
            if (enVoice) currentUtterance.voice = enVoice;
            window.speechSynthesis.speak(currentUtterance);
        }

        // Boot
        displayTopics();
    </script>
</body>
</html>
