<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard — SSC Preparation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --card: #1a1d2e; --accent: #4f8ef7;
            --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
            --text: #e2e8f0; --muted: #94a3b8; --border: #2d3748;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        .topbar {
            background: var(--card); padding: 16px 30px;
            display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid var(--border);
        }
        .topbar h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
        .topbar a { margin-left: auto; color: var(--muted); text-decoration: none; font-size: 14px; }
        .topbar a:hover { color: var(--text); }

        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

        /* Stat Cards */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card); border-radius: 12px; padding: 20px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-card .icon { font-size: 28px; margin-bottom: 10px; }
        .stat-card .num { font-size: 36px; font-weight: 800; }
        .stat-card .label { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .stat-card.green .num { color: var(--green); }
        .stat-card.red .num { color: var(--red); }
        .stat-card.orange .num { color: var(--orange); }
        .stat-card.blue .num { color: var(--accent); }

        /* Section */
        .section { background: var(--card); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .section h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 8px; }

        /* Charts */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } }

        /* History Table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 14px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
        td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .badge.tier1 { background: rgba(79,142,247,0.2); color: var(--accent); }
        .badge.tier2 { background: rgba(245,158,11,0.2); color: var(--orange); }

        /* Mistake Book */
        .mistake-item { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
        .mistake-item .q-text { font-size: 14px; margin-bottom: 8px; }
        .mistake-item .meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); }
        .mistake-item .correct { color: var(--green); font-weight: 600; font-size: 12px; margin-top: 6px; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn:hover { opacity: 0.85; }
        .btn.danger { background: var(--red); }
        .empty { text-align: center; padding: 40px; color: var(--muted); }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }

        /* Streak */
        .streak-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
        .streak-day { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .streak-day.done { background: var(--green); color: white; }
        .streak-day.missed { background: var(--border); color: var(--muted); }
        .streak-day.today { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="topbar">
        <i class="fas fa-chart-line" style="color: var(--accent); font-size: 20px;"></i>
        <h1>Progress Dashboard</h1>
        <a href="exam.html"><i class="fas fa-arrow-left"></i> Back to Exam</a>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
    </div>

    <div class="container">

        <!-- Stat Cards -->
        <div class="stats-row" id="stat-cards">
            <div class="stat-card blue"><div class="icon">📝</div><div class="num" id="stat-total">0</div><div class="label">Exams Taken</div></div>
            <div class="stat-card green"><div class="icon">🏆</div><div class="num" id="stat-best">0</div><div class="label">Best Score</div></div>
            <div class="stat-card orange"><div class="icon">📊</div><div class="num" id="stat-avg">0</div><div class="label">Avg Score</div></div>
            <div class="stat-card red"><div class="icon">⚠️</div><div class="num" id="stat-mistakes">0</div><div class="label">Mistakes Pending</div></div>
        </div>

        <!-- Charts -->
        <div class="chart-grid" style="margin-bottom: 24px;">
            <div class="section">
                <h2><i class="fas fa-chart-line"></i> Score Trend (Last 10 Exams)</h2>
                <canvas id="scoreTrendChart" height="200"></canvas>
            </div>
            <div class="section">
                <h2><i class="fas fa-spider"></i> Subject Accuracy Overview</h2>
                <canvas id="subjectRadar" height="200"></canvas>
            </div>
        </div>

        <!-- Daily Streak -->
        <div class="section" style="margin-bottom: 24px;">
            <h2><i class="fas fa-fire" style="color: #f59e0b;"></i> Study Streak <span id="streak-count" style="color: var(--orange); margin-left: 8px;">🔥 0 days</span></h2>
            <div class="streak-bar" id="streak-bar"></div>
        </div>

        <!-- History Table -->
        <div class="section" style="margin-bottom: 24px;">
            <h2><i class="fas fa-history"></i> Exam History</h2>
            <div id="history-table-container"></div>
        </div>

        <!-- Mistake Book -->
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin-bottom: 0;"><i class="fas fa-book-dead" style="color: var(--red);"></i> Mistake Book <span id="mistake-count" style="color: var(--red);"></span></h2>
                <button class="btn danger" onclick="clearMistakes()">Clear All</button>
            </div>
            <div id="mistake-list"></div>
        </div>

    </div>

    <script src="js/database/localStorageManager.js"></script>
    <script src="js/database/mistakeBook.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
        });

        function renderDashboard() {
            const history = JSON.parse(localStorage.getItem('ssc_exam_history') || '[]');
            const mistakes = MistakeBook.getAll();
            const mistakeCounts = MistakeBook.getCounts();

            // --- Stat Cards ---
            const scores = history.map(h => parseFloat(h.score));
            document.getElementById('stat-total').innerText = history.length;
            document.getElementById('stat-best').innerText = scores.length ? Math.max(...scores).toFixed(1) : '—';
            document.getElementById('stat-avg').innerText = scores.length ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1) : '—';
            document.getElementById('stat-mistakes').innerText = mistakeCounts.pending;

            // --- Score Trend Chart ---
            if (history.length > 0) {
                const last10 = history.slice(-10);
                const trendCtx = document.getElementById('scoreTrendChart').getContext('2d');
                new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: last10.map((h, i) => `Test ${i + 1}`),
                        datasets: [{
                            label: 'Score', data: last10.map(h => parseFloat(h.score)),
                            borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,0.15)',
                            tension: 0.4, fill: true, pointBackgroundColor: '#4f8ef7'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: false, grid: { color: '#2d3748' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
                    }
                });
            } else {
                document.getElementById('scoreTrendChart').parentElement.innerHTML += '<div class="empty"><div class="icon">📊</div><p>Take your first exam to see your trend!</p></div>';
                document.getElementById('scoreTrendChart').remove();
            }

            // --- Subject Radar ---
            const subjectAccuracy = getSubjectAccuracy();
            const radarCtx = document.getElementById('subjectRadar').getContext('2d');
            new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['Math', 'English', 'GK', 'Reasoning'],
                    datasets: [{
                        label: 'Accuracy %', data: subjectAccuracy,
                        backgroundColor: 'rgba(34,197,94,0.2)', borderColor: '#22c55e',
                        pointBackgroundColor: '#22c55e', borderWidth: 2
                    }]
                },
                options: { scales: { r: { beginAtZero: true, max: 100, ticks: { display: false }, grid: { color: '#2d3748' }, angleLines: { color: '#2d3748' } } }, plugins: { legend: { display: false } } }
            });

            // --- Streak ---
            renderStreak();

            // --- History Table ---
            renderHistoryTable(history);

            // --- Mistake Book ---
            renderMistakeBook(mistakes);
        }

        function getSubjectAccuracy() {
            const mistakes = MistakeBook.getAll();
            const sections = ['math', 'english', 'gk', 'reasoning'];
            return sections.map(sec => {
                const secMistakes = mistakes.filter(m => m.section === sec);
                if (secMistakes.length === 0) return 75; // Default estimate
                const correct = secMistakes.filter(m => m.lastResult === 'correct').length;
                return Math.round((correct / secMistakes.length) * 100);
            });
        }

        function renderStreak() {
            const streakEl = document.getElementById('streak-bar');
            const today = new Date();
            const examDates = new Set(
                JSON.parse(localStorage.getItem('ssc_exam_history') || '[]').map(h => h.date)
            );

            let streak = 0;
            let html = '';

            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const dateStr = d.toLocaleDateString();
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).charAt(0);
                const isToday = i === 0;
                const done = examDates.has(dateStr);

                if (done) streak++;
                else if (i < 6) streak = 0;

                const cls = isToday ? 'today' : (done ? 'done' : 'missed');
                html += `<div class="streak-day ${cls}" title="${dateStr}">${dayName}</div>`;
            }

            streakEl.innerHTML = html;
            document.getElementById('streak-count').innerText = `🔥 ${streak} day${streak !== 1 ? 's' : ''}`;
        }

        function renderHistoryTable(history) {
            const container = document.getElementById('history-table-container');
            if (history.length === 0) {
                container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No exams taken yet. Start your first mock test!</p></div>';
                return;
            }
            const sorted = [...history].reverse();
            let html = `<table><thead><tr><th>#</th><th>Date</th><th>Time</th><th>Pattern</th><th>Score</th></tr></thead><tbody>`;
            sorted.forEach((h, i) => {
                const score = parseFloat(h.score);
                const color = score >= 140 ? 'var(--green)' : score >= 100 ? 'var(--orange)' : 'var(--red)';
                html += `<tr>
                    <td>${sorted.length - i}</td>
                    <td>${h.date}</td>
                    <td>${h.time || '—'}</td>
                    <td><span class="badge ${h.pattern.toLowerCase()}">${h.pattern}</span></td>
                    <td style="font-weight: 800; color: ${color};">${h.score}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function renderMistakeBook(mistakes) {
            const container = document.getElementById('mistake-list');
            const count = MistakeBook.getCounts();
            document.getElementById('mistake-count').innerText = `(${count.pending} pending / ${count.total} total)`;

            if (mistakes.length === 0) {
                container.innerHTML = '<div class="empty"><div class="icon">✅</div><p>No mistakes recorded yet. Take a mock exam to populate this!</p></div>';
                return;
            }

            let html = '';
            mistakes.slice().reverse().forEach(m => {
                const statusColor = m.lastResult === 'correct' ? 'var(--green)' : 'var(--red)';
                const statusIcon = m.lastResult === 'correct' ? '✅' : '❌';
                html += `<div class="mistake-item">
                    <div class="q-text">${m.text}</div>
                    <div class="correct">✔ Correct: ${m.options[m.correctAnswer]}</div>
                    <div class="meta">
                        <span>📚 ${m.section.toUpperCase()}</span>
                        <span>🎯 ${m.difficulty}</span>
                        <span>📅 ${m.date}</span>
                        <span>🔁 ${m.attempts} attempt${m.attempts !== 1 ? 's' : ''}</span>
                        <span style="color: ${statusColor}; font-weight: 600;">${statusIcon} ${m.lastResult}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function clearMistakes() {
            if (confirm('Clear all mistakes from the book? This cannot be undone.')) {
                MistakeBook.clear();
                renderDashboard();
            }
        }
    </script>
</body>
</html>
