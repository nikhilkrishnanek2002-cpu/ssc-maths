<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="description" content="SSC Maths Master - Interactive learning platform for SSC CGL Mathematics" />
  <title>SSC Maths Master - Learn & Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'DM Sans', sans-serif;
      background: #0d0f14;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .root { width: 100%; }
    #loading {
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
      color: #f5a623;
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(245, 166, 35, 0.3);
      border-top: 4px solid #f5a623;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading SSC Maths Master...</p>
    </div>
  </div>
  <script src="/bundle.js"></script>
</body>
</html>
