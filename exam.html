<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC CGL Mock Exam - TCS Interface</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Exam Header -->
    <div class="exam-header">
        <div class="header-left">
            <h2>SSC CGL TIER-I Exam</h2>
        </div>
        <div class="header-right">
            <div class="practice-toggle">
                <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
                    <input type="checkbox" id="practice-mode-toggle" onchange="togglePracticeMode()">
                    <span style="font-size: 11px;">Practice Mode</span>
                </label>
            </div>
            <div class="feature-btns">
                <div class="pattern-switch">
                    <span style="font-size: 11px; font-weight: bold; margin-right: 5px;">Pattern:</span>
                    <button class="btn btn-pattern active" id="btn-tier1" onclick="switchPattern('tier1')">Tier-I</button>
                    <button class="btn btn-pattern" id="btn-tier2" onclick="switchPattern('tier2')">Tier-II</button>
                </div>
                <button class="btn btn-refresh" onclick="refreshQP()" title="Generate New Question Paper">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh QP
                </button>
                <button class="btn" onclick="toggleCalculator()"><i class="fa-solid fa-calculator"></i> Calc</button>
            </div>
            <div class="timer-box">
                Time Left: <span id="time-left" class="timer">60:00</span>
            </div>
        </div>
    </div>

    <!-- Main Exam Container -->
    <main class="exam-container">
        
        <!-- Left Side: Question Area -->
        <section class="question-section">
            <div class="section-tabs">
                <button class="tab-btn active" data-section="reasoning" onclick="switchSection('reasoning')">General Intelligence</button>
                <button class="tab-btn" data-section="gk" onclick="switchSection('gk')">General Awareness</button>
                <button class="tab-btn" data-section="math" onclick="switchSection('math')">Quantitative Aptitude</button>
                <button class="tab-btn" data-section="english" onclick="switchSection('english')">English Comprehension</button>
                <button class="tab-btn" data-section="computer" onclick="switchSection('computer')">Computer Knowledge</button>
            </div>
            
            <div class="question-header">
                <span>Question No. <span id="current-q-num">1</span></span>
                <span>Marks: <span class="positive-mark">+2.0</span> | <span class="negative-mark">-0.5</span></span>
            </div>

            <div class="question-content" id="question-text">
                <!-- Question text injected here -->
            </div>

            <div class="options-container" id="options-container">
                <!-- Options injected here -->
            </div>

            <div id="solution-box" class="solution-box hidden">
                <!-- Solution injected here -->
            </div>

            <div class="action-buttons">
                <div class="btn-group-left">
                    <button class="btn btn-secondary" onclick="markForReview()">Mark for Review & Next</button>
                    <button class="btn" onclick="clearResponse()">Clear Response</button>
                </div>
                <div class="btn-group-right">
                    <button class="btn btn-info hidden" id="btn-view-solution" onclick="showSolution()">View Solution</button>
                    <button class="btn btn-save" onclick="saveAndNext()">Save & Next</button>
                </div>
            </div>
        </section>

        <!-- Right Side: Palette and Profile Area -->
        <div class="palette-overlay" id="palette-overlay" onclick="togglePalette()"></div>
        <aside class="palette-section" id="palette-section">
            <div class="profile-area">
                <div class="profile-pic">
                    <img src="https://via.placeholder.com/70x80?text=SSC" alt="Candidate">
                </div>
                <div class="profile-info">
                    <p>Candidate Name: <strong>SSC ASPIRANT</strong></p>
                    <p>Exam Name: <strong>SSC CGL 2024</strong></p>
                </div>
            </div>

            <div class="status-legend">
                <div class="legend-item"><span class="badge answered"><span>0</span></span> Answered</div>
                <div class="legend-item"><span class="badge not-answered"><span>0</span></span> Not Answered</div>
                <div class="legend-item"><span class="badge not-visited"><span>0</span></span> Not Visited</div>
                <div class="legend-item"><span class="badge review"><span>0</span></span> Marked for Review</div>
                <div class="legend-item" style="grid-column: span 2;"><span class="badge review-answered"><span>0</span></span> Answered & Marked for Review</div>
            </div>

            <div class="question-palette-header">
                Question Palette
            </div>
            
            <div class="question-grid-container">
                <div class="question-grid" id="question-grid">
                    <!-- Grid buttons injected here -->
                </div>
            </div>

            <div class="submit-area">
                <button class="btn-submit" onclick="submitExam()">Submit</button>
            </div>
        </aside>

        <!-- On-Screen Calculator -->
        <div id="calculator-modal" class="calculator-modal hidden">
            <!-- Simplified Calculator content -->
            <div class="calc-header">
                <span>Calculator</span>
                <button onclick="toggleCalculator()" class="close-calc">&times;</button>
            </div>
            <div class="calc-display" id="calc-display">0</div>
            <div class="calc-body">
                <div class="calc-row">
                    <button class="calc-btn sci" onclick="calcInput('Math.sqrt(')">√</button>
                    <button class="calc-btn sci" onclick="calcInput('**2')">x²</button>
                    <button class="calc-btn sci" onclick="calcInput('%')">%</button>
                    <button class="calc-btn op" onclick="calcInput('/')">÷</button>
                </div>
                <div class="calc-row">
                    <button class="calc-btn sci" onclick="calcInput('(')">(</button>
                    <button class="calc-btn sci" onclick="calcInput(')')">)</button>
                    <button class="calc-btn sci" onclick="calcInput('Math.PI')">π</button>
                    <button class="calc-btn op" onclick="calcInput('*')">×</button>
                </div>
                <div class="calc-row">
                    <button class="calc-btn" onclick="calcInput('7')">7</button>
                    <button class="calc-btn" onclick="calcInput('8')">8</button>
                    <button class="calc-btn" onclick="calcInput('9')">9</button>
                    <button class="calc-btn op" onclick="calcInput('-')">-</button>
                </div>
                <div class="calc-row">
                    <button class="calc-btn" onclick="calcInput('4')">4</button>
                    <button class="calc-btn" onclick="calcInput('5')">5</button>
                    <button class="calc-btn" onclick="calcInput('6')">6</button>
                    <button class="calc-btn op" onclick="calcInput('+')">+</button>
                </div>
                <div class="calc-row">
                    <button class="calc-btn" onclick="calcInput('1')">1</button>
                    <button class="calc-btn" onclick="calcInput('2')">2</button>
                    <button class="calc-btn" onclick="calcInput('3')">3</button>
                    <button class="calc-btn equal" onclick="calcInput('=')" style="flex: 1;">=</button>
                </div>
                <div class="calc-row">
                    <button class="calc-btn" onclick="calcInput('0')">0</button>
                    <button class="calc-btn" onclick="calcInput('.')">.</button>
                    <button class="calc-btn action" onclick="calcInput('Back')"><i class="fa-solid fa-backspace"></i></button>
                    <button class="calc-btn clear" onclick="calcInput('Clear')">C</button>
                </div>
            </div>
        </div>
    </main>

    <div class="mobile-palette-toggle" onclick="togglePalette()">
        <i class="fa-solid fa-table-cells"></i>
    </div>

    <!-- Scripts -->
    <script>
        function togglePalette() {
            document.getElementById('palette-section').classList.toggle('active');
            document.getElementById('palette-overlay').classList.toggle('active');
        }
    </script>
    <script src="js/data/english_bank.js"></script>
    <script src="js/data/gk_bank.js"></script>
    <script src="js/data/pyq_bank.js"></script>
    <script src="js/data/computer_knowledge.js"></script>
    <script src="js/modules/math_generator.js"></script>
    <script src="js/modules/reasoning_generator.js"></script>
    <script src="js/modules/computer_generator.js"></script>
    <script src="js/components/ExamEngine.js"></script>
    <script src="js/database/localStorageManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
